<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>AEO/GEO 퀴즈</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #fafaf8;
    --card: #ffffff;
    --border: #e8e4dc;
    --accent: #4f6ef7;
    --accent-light: #eef1fe;
    --correct: #22c55e;
    --correct-light: #f0fdf4;
    --wrong: #ef4444;
    --wrong-light: #fef2f2;
    --text: #1a1a1a;
    --muted: #6b7280;
    --radius: 14px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    min-height: -webkit-fill-available;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }

  .header {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 16px 20px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header h1 {
    font-size: 18px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: -0.3px;
  }

  .header p {
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
  }

  .container { max-width: 640px; margin: 0 auto; padding: 20px 16px 40px; }

  /* 날짜 선택 */
  .date-section { margin-bottom: 24px; }

  .date-section label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .date-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .date-btn {
    padding: 8px 16px;
    border: 1.5px solid var(--border);
    border-radius: 20px;
    background: var(--card);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--text);
    -webkit-appearance: none;
  }

  .date-btn:hover { border-color: var(--accent); color: var(--accent); }
  .date-btn.active { background: var(--accent); border-color: var(--accent); color: white; }

  /* 진행률 */
  .progress-bar-wrap {
    background: var(--border);
    border-radius: 99px;
    height: 6px;
    margin-bottom: 12px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 99px;
    transition: width 0.3s ease;
  }
  .progress-text {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .progress-text span { font-weight: 600; color: var(--accent); }

  /* 문제 번호 네비게이션 */
  .q-nav {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 20px;
  }

  .nav-arrow-btn {
    flex-shrink: 0;
    width: 36px;
    height: 36px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    background: var(--card);
    color: var(--text);
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    -webkit-appearance: none;
    line-height: 1;
  }
  .nav-arrow-btn:hover:not(:disabled) {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-light);
  }
  .nav-arrow-btn:disabled {
    opacity: 0.35;
    cursor: default;
  }

  .q-chip-scroll {
    flex: 1;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    padding: 2px 0;
  }
  .q-chip-scroll::-webkit-scrollbar { display: none; }

  .q-chip-row {
    display: flex;
    gap: 6px;
    width: max-content;
  }

  .q-chip {
    width: 34px;
    height: 34px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    background: var(--card);
    color: var(--muted);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
    -webkit-appearance: none;
  }
  .q-chip:hover { border-color: var(--accent); color: var(--accent); }
  .q-chip.current {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }
  .q-chip.q-correct {
    background: var(--correct-light);
    border-color: var(--correct);
    color: #16a34a;
  }
  .q-chip.q-correct.current {
    background: var(--correct);
    border-color: var(--correct);
    color: white;
  }
  .q-chip.q-wrong {
    background: var(--wrong-light);
    border-color: var(--wrong);
    color: #dc2626;
  }
  .q-chip.q-wrong.current {
    background: var(--wrong);
    border-color: var(--wrong);
    color: white;
  }

  /* 글 섹션 제목 */
  .post-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--accent);
    background: var(--accent-light);
    border-radius: 8px;
    padding: 8px 12px;
    margin-bottom: 16px;
    line-height: 1.4;
  }

  /* 퀴즈 카드 */
  .quiz-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 16px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.04);
  }

  .question-num {
    font-size: 12px;
    font-weight: 700;
    color: var(--muted);
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .question-text {
    font-size: 16px;
    font-weight: 600;
    line-height: 1.5;
    margin-bottom: 16px;
    color: var(--text);
  }

  .choices { display: flex; flex-direction: column; gap: 8px; }

  .choice-btn {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 12px 14px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    background: var(--card);
    cursor: pointer;
    text-align: left;
    font-size: 15px;
    line-height: 1.45;
    color: var(--text);
    transition: all 0.15s;
    -webkit-appearance: none;
    width: 100%;
  }

  .choice-btn:hover:not(:disabled) {
    border-color: var(--accent);
    background: var(--accent-light);
  }

  .choice-btn:disabled { cursor: default; }

  .choice-btn .num {
    font-size: 13px;
    font-weight: 700;
    color: var(--muted);
    min-width: 18px;
    padding-top: 1px;
  }

  .choice-btn.correct {
    border-color: var(--correct);
    background: var(--correct-light);
  }
  .choice-btn.correct .num { color: var(--correct); }

  .choice-btn.wrong {
    border-color: var(--wrong);
    background: var(--wrong-light);
  }
  .choice-btn.wrong .num { color: var(--wrong); }

  .choice-btn.highlight {
    border-color: var(--correct);
    background: var(--correct-light);
  }
  .choice-btn.highlight .num { color: var(--correct); }

  /* 해설 */
  .explanation {
    display: none;
    margin-top: 12px;
    padding: 12px 14px;
    background: #f8f9fe;
    border-left: 3px solid var(--accent);
    border-radius: 0 8px 8px 0;
    font-size: 14px;
    line-height: 1.6;
    color: #374151;
  }
  .explanation.show { display: block; }
  .explanation strong { color: var(--accent); font-size: 12px; text-transform: uppercase; letter-spacing: 0.3px; display: block; margin-bottom: 4px; }

  /* 다음 버튼 */
  .next-btn {
    display: none;
    width: 100%;
    padding: 14px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 16px;
    transition: opacity 0.15s;
    -webkit-appearance: none;
  }
  .next-btn:active { opacity: 0.85; }
  .next-btn.show { display: block; }

  /* 완료 메시지 */
  .complete-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 32px 20px;
    text-align: center;
    display: none;
  }
  .complete-card.show { display: block; }
  .complete-card .emoji { font-size: 48px; margin-bottom: 12px; }
  .complete-card h2 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
  .complete-card p { color: var(--muted); font-size: 15px; margin-bottom: 20px; }
  .restart-btn {
    padding: 12px 28px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    -webkit-appearance: none;
  }

  /* 로딩/에러 */
  .status-msg {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
    font-size: 15px;
  }

  /* 점수판 */
  .score-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: var(--accent-light);
    color: var(--accent);
    border-radius: 20px;
    padding: 3px 10px;
    font-size: 13px;
    font-weight: 600;
  }
</style>
</head>
<body>

<div class="header">
  <h1>AEO/GEO 퀴즈</h1>
  <p>AI 검색 최적화 학습 퀴즈</p>
</div>

<div class="container">
  <div class="date-section">
    <label>날짜 선택</label>
    <div class="date-grid" id="dateGrid">
      <div class="status-msg">날짜 목록 불러오는 중...</div>
    </div>
  </div>

  <div id="quizArea" style="display:none">
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
    </div>
    <div class="progress-text">
      <span id="progressLabel">1 / 1</span>
      <div class="score-badge">점수 <span id="scoreLabel">0</span></div>
    </div>

    <!-- 문제 번호 네비게이션 -->
    <div class="q-nav" id="qNav">
      <button class="nav-arrow-btn" id="prevBtn" onclick="goPrev()" title="이전 문제">&#8592;</button>
      <div class="q-chip-scroll">
        <div class="q-chip-row" id="qChipRow"></div>
      </div>
      <button class="nav-arrow-btn" id="nextNavBtn" onclick="goNext()" title="다음 문제">&#8594;</button>
    </div>

    <div id="quizCards"></div>
    <button class="next-btn" id="nextBtn" onclick="nextQuestion()">다음 문제 →</button>
    <div class="complete-card" id="completeCard">
      <div class="emoji">🎉</div>
      <h2>퀴즈 완료!</h2>
      <p id="finalScore"></p>
      <button class="restart-btn" onclick="restartQuiz()">처음부터 다시</button>
    </div>
  </div>
</div>

<script>
// ─── 설정 ───────────────────────────────────────────────
const GITHUB_USER = 'squidwardeeh';
const GITHUB_REPO = 'geo-quiz';
const BRANCH = 'main';

const RAW_BASE = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/${BRANCH}/quiz`;
const API_CONTENTS = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/quiz`;

// ─── 상태 ───────────────────────────────────────────────
let allQuestions = [];
let currentIdx = 0;
let score = 0;
// 문제별 답변 상태: { answered, selectedIdx, isCorrect }
let questionStates = [];

// ─── 날짜 목록 로드 ─────────────────────────────────────
async function loadDateList() {
  const grid = document.getElementById('dateGrid');
  try {
    const res = await fetch(API_CONTENTS);
    if (!res.ok) throw new Error('API 오류');
    const files = await res.json();
    // YYYYMMDDHHmmss.txt 형식 (14자리)
    const txts = files.filter(f => /^\d{14}\.txt$/.test(f.name)).sort((a,b) => b.name.localeCompare(a.name));
    if (txts.length === 0) {
      grid.innerHTML = '<div class="status-msg">아직 퀴즈 파일이 없습니다.</div>';
      return;
    }
    // 날짜(앞 8자리)별 그룹핑
    const groups = {};
    txts.forEach(f => {
      const dk = f.name.slice(0, 8);
      if (!groups[dk]) groups[dk] = [];
      groups[dk].push(f.name);
    });
    window.__dateGroups = groups;

    const sortedDates = Object.keys(groups).sort((a,b) => b.localeCompare(a));
    grid.innerHTML = sortedDates.map(dk => {
      const label = `${dk.slice(0,4)}.${dk.slice(4,6)}.${dk.slice(6,8)}`;
      const cnt = groups[dk].length;
      const badge = cnt > 1 ? ` <span style="font-size:11px;opacity:.7">(${cnt}회)</span>` : '';
      return `<button class="date-btn" onclick="loadDateGroup('${dk}', this)">${label}${badge}</button>`;
    }).join('');
    // 최신 날짜 자동 로드
    const firstBtn = grid.querySelector('.date-btn');
    if (firstBtn) firstBtn.click();
  } catch(e) {
    grid.innerHTML = '<div class="status-msg">목록을 불러올 수 없습니다.</div>';
  }
}

// ─── 날짜 그룹 로드 (해당 날의 모든 파일 합산) ──────────
async function loadDateGroup(dateKey, btn) {
  document.querySelectorAll('.date-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');

  const area = document.getElementById('quizArea');
  const cards = document.getElementById('quizCards');
  area.style.display = 'block';
  cards.innerHTML = '<div class="status-msg">퀴즈 불러오는 중...</div>';
  document.getElementById('nextBtn').classList.remove('show');
  document.getElementById('completeCard').classList.remove('show');
  document.getElementById('qNav').style.display = 'none';

  const files = (window.__dateGroups && window.__dateGroups[dateKey]) || [];
  if (files.length === 0) {
    cards.innerHTML = '<div class="status-msg">해당 날짜의 파일이 없습니다.</div>';
    return;
  }

  try {
    // 해당 날짜의 모든 파일을 병렬 로드 후 합치기
    const texts = await Promise.all(files.map(async fname => {
      const r = await fetch(`${RAW_BASE}/${fname}?t=${Date.now()}`);
      return r.ok ? await r.text() : '';
    }));
    const combined = texts.filter(t => t.trim()).join('\n\n');
    allQuestions = parseQuiz(combined);
    if (allQuestions.length === 0) throw new Error('퀴즈 없음');
    currentIdx = 0;
    score = 0;
    questionStates = allQuestions.map(() => ({ answered: false, selectedIdx: null, isCorrect: null }));
    document.getElementById('qNav').style.display = 'flex';
    buildChips();
    renderQuestion();
  } catch(e) {
    cards.innerHTML = `<div class="status-msg">😅 퀴즈를 불러올 수 없습니다.<br><small>${e.message}</small></div>`;
  }
}

// ─── 파싱 ───────────────────────────────────────────────
function parseQuiz(raw) {
  const questions = [];
  const lines = raw.split('\n');
  let currentPost = '';
  let i = 0;

  while (i < lines.length) {
    const line = lines[i].trim();

    // 글 제목 감지
    if (line.startsWith('[') && line.endsWith(']') && !line.startsWith('[Q') && !/^\[\d+\)/.test(line)) {
      currentPost = line.slice(1, -1).trim();
      i++; continue;
    }

    // 질문 감지
    if (/^Q\d+\./.test(line)) {
      const qText = line.replace(/^Q\d+\.\s*/, '').trim();
      const choices = [];
      let answer = null;
      let explanation = '';
      let j = i + 1;

      while (j < lines.length) {
        const l = lines[j].trim();
        if (/^\d+\)/.test(l)) {
          choices.push(l.replace(/^\d+\)\s*/, '').trim());
        } else if (/^정답:\s*\d+/.test(l)) {
          answer = parseInt(l.match(/\d+/)[0]) - 1;
        } else if (/^해설:/.test(l)) {
          explanation = l.replace(/^해설:\s*/, '').trim();
          let k = j + 1;
          while (k < lines.length && lines[k].trim() && !/^Q\d+\./.test(lines[k].trim()) && !lines[k].trim().startsWith('[')) {
            const next = lines[k].trim();
            if (/^\d+\)/.test(next) || /^정답:/.test(next)) break;
            explanation += ' ' + next;
            k++;
          }
        } else if (/^Q\d+\./.test(l) || (l.startsWith('[') && l.endsWith(']'))) {
          break;
        }
        j++;
      }

      if (qText && choices.length === 4 && answer !== null) {
        questions.push({ post: currentPost, question: qText, choices, answer, explanation });
      }
      i = j; continue;
    }
    i++;
  }
  return questions;
}

// ─── 칩 빌드 ─────────────────────────────────────────────
function buildChips() {
  const row = document.getElementById('qChipRow');
  row.innerHTML = allQuestions.map((_, i) =>
    `<button class="q-chip" id="chip${i}" onclick="goToQuestion(${i})">${i + 1}</button>`
  ).join('');
}

function updateChips() {
  allQuestions.forEach((_, i) => {
    const chip = document.getElementById(`chip${i}`);
    if (!chip) return;
    chip.className = 'q-chip';
    const st = questionStates[i];
    if (st.answered) {
      chip.classList.add(st.isCorrect ? 'q-correct' : 'q-wrong');
    }
    if (i === currentIdx) chip.classList.add('current');
  });

  // 현재 칩이 보이도록 스크롤
  const chip = document.getElementById(`chip${currentIdx}`);
  if (chip) {
    chip.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
  }

  // 이전/다음 버튼 활성화
  document.getElementById('prevBtn').disabled = currentIdx === 0;
  document.getElementById('nextNavBtn').disabled = currentIdx >= allQuestions.length - 1;
}

// ─── 문제 이동 ───────────────────────────────────────────
function goToQuestion(idx) {
  if (idx < 0 || idx >= allQuestions.length) return;
  currentIdx = idx;
  renderQuestion();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function goPrev() { goToQuestion(currentIdx - 1); }
function goNext() { goToQuestion(currentIdx + 1); }

// ─── 렌더링 ─────────────────────────────────────────────
function renderQuestion() {
  const cards = document.getElementById('quizCards');
  const complete = document.getElementById('completeCard');
  const nextBtn = document.getElementById('nextBtn');

  complete.classList.remove('show');
  nextBtn.classList.remove('show');

  if (currentIdx >= allQuestions.length) {
    showComplete();
    return;
  }

  updateProgress();
  updateChips();

  const q = allQuestions[currentIdx];
  const st = questionStates[currentIdx];
  const isFirstInPost = currentIdx === 0 || allQuestions[currentIdx - 1].post !== q.post;

  cards.innerHTML = `
    ${isFirstInPost && q.post ? `<div class="post-title">📄 ${q.post}</div>` : ''}
    <div class="quiz-card">
      <div class="question-num">문제 ${currentIdx + 1}</div>
      <div class="question-text">${q.question}</div>
      <div class="choices">
        ${q.choices.map((c, i) => `
          <button class="choice-btn" onclick="selectChoice(this, ${i})" data-idx="${i}">
            <span class="num">${i + 1}</span>
            <span>${c}</span>
          </button>
        `).join('')}
      </div>
      <div class="explanation" id="exp">
        <strong>해설</strong>${q.explanation}
      </div>
    </div>
  `;

  // 이미 답변한 문제면 상태 복원
  if (st.answered) {
    const allBtns = document.querySelectorAll('.choice-btn');
    allBtns.forEach(b => { b.disabled = true; });
    allBtns[st.selectedIdx].classList.add(st.isCorrect ? 'correct' : 'wrong');
    if (!st.isCorrect) allBtns[q.answer].classList.add('highlight');
    document.getElementById('exp').classList.add('show');

    const isLast = currentIdx === allQuestions.length - 1;
    nextBtn.textContent = isLast ? '결과 보기 🏆' : '다음 문제 →';
    nextBtn.classList.add('show');
  }
}

function selectChoice(btn, idx) {
  const st = questionStates[currentIdx];
  if (st.answered) return;

  const q = allQuestions[currentIdx];
  const isCorrect = idx === q.answer;

  st.answered = true;
  st.selectedIdx = idx;
  st.isCorrect = isCorrect;

  if (isCorrect) score++;

  const allBtns = document.querySelectorAll('.choice-btn');
  allBtns.forEach(b => { b.disabled = true; });

  btn.classList.add(isCorrect ? 'correct' : 'wrong');
  if (!isCorrect) allBtns[q.answer].classList.add('highlight');

  document.getElementById('exp').classList.add('show');
  document.getElementById('scoreLabel').textContent = score;

  updateChips();

  const nextBtn = document.getElementById('nextBtn');
  const isLast = currentIdx === allQuestions.length - 1;
  nextBtn.textContent = isLast ? '결과 보기 🏆' : '다음 문제 →';
  nextBtn.classList.add('show');
}

function nextQuestion() {
  if (currentIdx >= allQuestions.length - 1) {
    showComplete();
  } else {
    currentIdx++;
    renderQuestion();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

function updateProgress() {
  const total = allQuestions.length;
  const curr = currentIdx + 1;
  const answeredCount = questionStates.filter(s => s.answered).length;
  const pct = (answeredCount / total) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = `${curr} / ${total}`;
}

function showComplete() {
  document.getElementById('quizCards').innerHTML = '';
  document.getElementById('nextBtn').classList.remove('show');
  document.getElementById('progressFill').style.width = '100%';
  document.getElementById('progressLabel').textContent = `${allQuestions.length} / ${allQuestions.length}`;

  const pct = Math.round((score / allQuestions.length) * 100);
  const emoji = pct >= 80 ? '🎉' : pct >= 60 ? '👍' : '📚';
  document.querySelector('.complete-card .emoji').textContent = emoji;
  document.getElementById('finalScore').textContent = `${allQuestions.length}문제 중 ${score}문제 정답 (${pct}%)`;
  document.getElementById('completeCard').classList.add('show');
}

function restartQuiz() {
  currentIdx = 0;
  score = 0;
  questionStates = allQuestions.map(() => ({ answered: false, selectedIdx: null, isCorrect: null }));
  document.getElementById('completeCard').classList.remove('show');
  document.getElementById('scoreLabel').textContent = '0';
  buildChips();
  renderQuestion();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ─── 초기화 ─────────────────────────────────────────────
loadDateList();
</script>
</body>
</html>
